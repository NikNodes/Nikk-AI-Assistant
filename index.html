<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NIKK AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#050510;--blue:#00AAFF;--cyan:#00FFFF;--purple:#7B2FFF;--text:#fff;--muted:rgba(255,255,255,.45);--glass:rgba(255,255,255,.05);
}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);font-family:"Space Grotesk",sans-serif;color:#fff;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at center,rgba(0,170,255,.18),transparent 40%),radial-gradient(circle at center,rgba(123,47,255,.12),transparent 70%);pointer-events:none}
#loading{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;font-size:60px;letter-spacing:.4em;z-index:9;animation:fade 3s forwards}
@keyframes fade{0%,70%{opacity:1}100%{opacity:0;visibility:hidden}}
.app{position:relative;z-index:1;height:100%;display:grid;grid-template-rows:70px 1fr 90px 28px}
header{display:grid;grid-template-columns:1fr 1fr 1fr;padding:20px 40px}
.logo:before{content:"";display:inline-block;width:10px;height:10px;background:var(--cyan);border-radius:50%;box-shadow:0 0 20px var(--cyan);margin-right:10px}
.center{text-align:center}.right{text-align:right}
main{display:grid;grid-template-columns:1fr 360px;padding:20px 40px;gap:30px}
.voice{display:flex;align-items:center;justify-content:center;flex-direction:column}
.ring{width:260px;height:260px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--cyan),transparent,var(--blue),transparent,var(--purple));animation:spin 8s linear infinite;padding:6px;box-shadow:0 0 40px rgba(0,170,255,.3)}
.inner{width:100%;height:100%;border-radius:50%;background:#06060d;display:flex;align-items:center;justify-content:center}
.wave{display:flex;gap:10px;align-items:flex-end;height:90px}
.bar{width:12px;background:linear-gradient(var(--cyan),var(--blue));border-radius:20px;animation:wave 1s infinite ease-in-out}
.bar:nth-child(2){animation-delay:.1s}.bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}.bar:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:15px}50%{height:70px}}
@keyframes spin{to{transform:rotate(360deg)}}
.status{margin-top:30px;font-size:28px;letter-spacing:.3em;text-shadow:0 0 15px var(--blue)}
.chat{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;overflow:auto}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;margin:10px 0;animation:slide .4s}
.user{margin-left:auto;border:1px solid var(--blue);box-shadow:0 0 20px rgba(0,170,255,.2)}
.ai{border:1px solid var(--purple);box-shadow:0 0 20px rgba(123,47,255,.2)}
@keyframes slide{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
.controls{display:flex;justify-content:center;gap:25px;align-items:center}
button{background:transparent;color:#fff;border:1px solid var(--blue);padding:14px 36px;border-radius:999px;font:inherit;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(0,170,255,.45)}
#start.active{border-color:#00ff88;box-shadow:0 0 20px #00ff88}
#stop{border-color:#ff3355}#clear{border-color:#ddd}
footer{border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:0 20px;color:var(--muted);position:relative;overflow:hidden}
footer:before{content:"";position:absolute;left:-30%;width:30%;top:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(0,170,255,.3),transparent);animation:scan 3s linear infinite}
@keyframes scan{to{left:130%}}
</style>
</head>
<body>
<div id="loading">NIKK</div>
<canvas id="bg"></canvas>
<div class="app">
<header><div class="logo">NIKK</div><div class="center">● ONLINE</div><div class="right" id="clock"></div></header>
<main>
<div class="voice"><div class="ring"><div class="inner"><div class="wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div></div><div class="status" id="state">READY</div></div>
<div class="chat" id="chat"></div>
</main>
<div class="controls"><button id="start">🎤 START</button><button id="stop">⬛ STOP</button><button id="clear">🗑️ CLEAR</button></div>
<footer id="foot">STATUS : READY</footer>
</div>
<script>
const c=document.getElementById('bg'),x=c.getContext('2d');let w,h,m={x:-999,y:-999};function rs(){w=c.width=innerWidth;h=c.height=innerHeight}rs();onresize=rs;
const p=[...Array(220)].map(()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6}));
onmousemove=e=>m={x:e.clientX,y:e.clientY};
(function a(){x.clearRect(0,0,w,h);for(let i=0;i<p.length;i++){let A=p[i];let dx=A.x-m.x,dy=A.y-m.y,d=Math.hypot(dx,dy);if(d<120){A.vx+=dx/d*.02;A.vy+=dy/d*.02}A.x+=A.vx;A.y+=A.vy;if(A.x<0||A.x>w)A.vx*=-1;if(A.y<0||A.y>h)A.vy*=-1;x.fillStyle="#8fdcff";x.fillRect(A.x,A.y,2,2);for(let j=i+1;j<p.length;j++){let B=p[j],dd=Math.hypot(A.x-B.x,A.y-B.y);if(dd<90){x.strokeStyle="rgba(0,170,255,"+(1-dd/90)*.2+")";x.beginPath();x.moveTo(A.x,A.y);x.lineTo(B.x,B.y);x.stroke();}}}requestAnimationFrame(a)})();
setInterval(()=>clock.textContent=new Date().toLocaleTimeString(),1000);

async function post(url){try{await fetch(url,{method:"POST"})}catch(e){}}
start.onclick=()=>{start.classList.add("active");state.textContent="LISTENING...";foot.textContent="STATUS : LISTENING";post("/start")}
stop.onclick=()=>{start.classList.remove("active");state.textContent="STOPPED";foot.textContent="STATUS : STOPPED";post("/stop")}
clear.onclick=()=>{chat.innerHTML="";post("/clear")}
async function poll(){
try{
let s=await fetch("/status").then(r=>r.json());
state.textContent=s.state||state.textContent;
foot.textContent="STATUS : "+(s.state||"READY");
}catch(e){}
try{
let arr=await fetch("/chat").then(r=>r.json());
chat.innerHTML="";
arr.forEach(m=>{
let d=document.createElement("div");
d.className="msg "+(m.role==="user"?"user":"ai");
d.textContent=m.text;
chat.appendChild(d);
});
chat.scrollTop=chat.scrollHeight;
}catch(e){}
}
setInterval(poll,1000);
poll();
</script>
</body>
</html>
